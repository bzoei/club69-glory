<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clan Stats · Survivor.io</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root {
  --gold:#FFB800; --gold-light:#FFD54F; --gold-dark:#E65100;
  --bg:#0a0c14; --bg3:#181c2e; --bg4:#1f2438;
  --surface:#242840; --border:#3a3f5c;
  --text:#e8ecf8; --muted:#7a80a0;
  --accent:#6c63ff; --green:#4caf50; --red:#f44336;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Exo 2',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(108,99,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(108,99,255,.04) 1px,transparent 1px);
  background-size:40px 40px}
@keyframes spin{to{transform:rotate(360deg)}}

header{position:sticky;top:0;z-index:100;background:rgba(10,12,20,.96);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:58px;gap:10px}
.hlogo{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:18px;color:var(--gold);letter-spacing:2px;white-space:nowrap}
.hlogo span{color:var(--muted);font-weight:400}
.badge{background:rgba(76,175,80,.15);border:1px solid rgba(76,175,80,.3);color:var(--green);font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}

.page{position:relative;z-index:1;padding:20px;max-width:1100px;margin:0 auto}
.ptitle{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;margin-bottom:4px}
.ptitle span{color:var(--gold)}
.pdesc{color:var(--muted);font-size:13px;margin-bottom:22px}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:14px;margin-bottom:24px}
.scard{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:18px}
.scard .lbl{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.5px;margin-bottom:6px}
.scard .val{font-family:'Rajdhani',sans-serif;font-size:30px;font-weight:700;color:var(--gold)}
.sec-title{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border);margin-left:6px}

.whgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:24px}
.whcard{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px}
.whtop{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--gold);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.gbrow{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.gbrow .nm{font-size:13px;font-weight:600}
.gbrow .mt{font-size:11px;color:var(--muted);margin-left:auto}

.dbt{background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:24px}
.dbt table{width:100%;border-collapse:collapse}
.dbt thead th{background:var(--bg4);padding:9px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap}
.dbt tbody tr{border-bottom:1px solid rgba(58,63,92,.35)}
.dbt tbody tr:hover{background:var(--bg4)}
.dbt tbody tr:last-child{border-bottom:none}
.dbt td{padding:9px 14px;font-size:13px}
.tscroll{overflow-x:auto}

.cbars{display:flex;align-items:flex-end;gap:5px;height:180px;padding-top:16px}
.bcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end;min-width:26px}
.bfill{width:100%;background:linear-gradient(to top,var(--accent),rgba(108,99,255,.3));border-radius:4px 4px 0 0;min-height:2px;position:relative;cursor:pointer}
.bfill.boss-bar{background:linear-gradient(to top,#ce93d8,rgba(206,147,216,.25))}
.bfill:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--border);padding:3px 8px;border-radius:6px;font-size:11px;white-space:nowrap;color:var(--text);z-index:10}
.chart-legend{display:flex;gap:16px;font-size:11px;color:var(--muted);margin-bottom:8px}
.chart-legend span{display:flex;align-items:center;gap:5px}
.chart-legend .ldot{width:10px;height:10px;border-radius:3px}
.chart-legend .ldot.clash{background:var(--accent)}
.chart-legend .ldot.boss{background:#ce93d8}
.chart-cluster{display:flex;gap:24px;margin-top:8px}
.chart-cluster .cluster-section{flex:1;min-width:0}
.chart-cluster .cluster-label{font-size:11px;font-weight:700;letter-spacing:.5px;margin-bottom:6px;text-align:center}
.lb-name{font-weight:600;cursor:pointer;transition:color .2s}
.lb-name:hover{color:var(--gold)}
.player-chart-inline{overflow:hidden;transition:max-height .3s ease,padding .3s ease;max-height:0;padding:0 14px}
.player-chart-inline.open{max-height:400px;padding:14px}
.pct-green{color:#4caf50;font-weight:600}
.pct-yellow{color:#ffc107;font-weight:600}
.pct-orange{color:#ff9800;font-weight:600}
.pct-red{color:#f44336;font-weight:600}
.blbl{font-size:9px;color:var(--muted);text-align:center;overflow:hidden;width:100%;white-space:nowrap;text-overflow:ellipsis}

.empty{color:var(--muted);font-size:13px;padding:20px;text-align:center}
.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:40px;color:var(--muted);font-size:14px}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite}

@media(max-width:600px){
  .page{padding:12px}
  header{padding:0 10px}
  .hlogo{font-size:15px}
}
</style>
</head>
<body>

<header>
  <div class="hlogo">⚔ GLORY <span>MANAGER</span></div>
  <div class="badge">📊 Public Stats</div>
</header>

<div class="page">
  <div class="ptitle">Clan <span>Statistics</span></div>
  <div class="pdesc">Live stats from the clan — updated after each weekly scan.</div>

  <div id="loading" class="loading"><div class="spinner"></div> Loading stats from Firebase…</div>

  <div id="content" style="display:none">
    <div class="stats-grid" id="overview-stats"></div>
    <div class="sec-title">📅 Weekly History</div>
    <div class="whgrid" id="week-history-grid"></div>
    <div class="sec-title">👑 Glory Hall of Fame</div>
    <div class="dbt" id="glory-hof"></div>
    <div class="sec-title">📊 All-Time Leaderboard <span style="font-size:12px;color:var(--muted);font-weight:400;font-family:'Exo 2',sans-serif">(click a name to see history)</span></div>
    <div class="dbt" id="leaderboard-table"></div>
  </div>
</div>

<script>
const FIREBASE_CONFIG={
  apiKey:"AIzaSyAamx1N1e7bKPhkFsealyB7R-qI7cpqDog",
  authDomain:"glory-manager-b2823.firebaseapp.com",
  projectId:"glory-manager-b2823",
  storageBucket:"glory-manager-b2823.firebasestorage.app",
  messagingSenderId:"568627462037",
  appId:"1:568627462037:web:07f89fa877a3f8fb89009c"
};

let weeks=[];

function esc(s){
  const d=document.createElement('div');d.textContent=s;return d.innerHTML;
}

function pctClass(pct){
  if(pct>=90)return 'pct-green';
  if(pct>=70)return 'pct-yellow';
  if(pct>=50)return 'pct-orange';
  return 'pct-red';
}

async function init(){
  try{
    const app=firebase.initializeApp(FIREBASE_CONFIG);
    const db=firebase.firestore(app);
    const snap=await db.collection('glory').doc('weeks').get();
    if(snap.exists && snap.data().list) weeks=snap.data().list;
  }catch(e){
    console.error('Firebase error:',e);
    document.getElementById('loading').innerHTML='<span style="color:var(--red)">Could not load data. Please try again later.</span>';
    return;
  }
  document.getElementById('loading').style.display='none';
  document.getElementById('content').style.display='block';
  renderStats();
}

function renderStats(){
  const allP=new Set();let totM=0;
  weeks.forEach(w=>w.players.forEach(p=>{allP.add(p.name);totM+=p.total;}));
  document.getElementById('overview-stats').innerHTML=`
    <div class="scard"><div class="lbl">WEEKS TRACKED</div><div class="val">${weeks.length}</div></div>
    <div class="scard"><div class="lbl">UNIQUE PLAYERS</div><div class="val">${allP.size}</div></div>
    <div class="scard"><div class="lbl">TOTAL MEDALS</div><div class="val">${totM.toLocaleString()}</div></div>
    <div class="scard"><div class="lbl">GLORY TITLES</div><div class="val">${weeks.reduce((s,w)=>s+w.gloryWinners.length,0)}</div></div>`;

  const wh=document.getElementById('week-history-grid');
  if(!weeks.length)wh.innerHTML='<div class="empty">No weeks saved yet.</div>';
  else wh.innerHTML=weeks.map(w=>`
    <div class="whcard">
      <div class="whtop"><span>🗓 ${esc(w.label)}</span><span style="font-size:11px;color:var(--muted)">${w.date}</span></div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px">${w.players.length} members · ${w.players.reduce((s,p)=>s+p.total,0).toLocaleString()} medals</div>
      <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px">GLORY MEMBERS</div>
      ${w.gloryWinners.map((g,i)=>`<div class="gbrow"><span>${['🥇','🥈','🥉'][i]}</span><span class="nm">${esc(g.name)}</span><span class="mt">${g.medals} 🏅</span></div>`).join('')}
    </div>`).join('');

  const counts={};weeks.forEach(w=>w.gloryWinners.forEach(g=>{counts[g.name]=(counts[g.name]||0)+1;}));
  const hof=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const hofD=document.getElementById('glory-hof');
  if(!hof.length)hofD.innerHTML='<div class="empty">No glory members yet.</div>';
  else hofD.innerHTML=`<div class="tscroll"><table><thead><tr><th>#</th><th>PLAYER</th><th>GLORY TITLES</th><th></th></tr></thead><tbody>
    ${hof.map(([n,c],i)=>`<tr><td style="font-family:'Rajdhani',sans-serif;font-weight:700;font-size:16px;color:${['#FFD700','#C0C0C0','#CD7F32'][i]||'var(--muted)'};width:44px">${i+1}</td><td style="font-weight:600">${esc(n)}</td><td style="color:var(--gold);font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700">${c} 👑</td><td>${'⭐'.repeat(Math.min(c,10))}</td></tr>`).join('')}
    </tbody></table></div>`;

  const lb={};weeks.forEach(w=>w.players.forEach(p=>{if(!lb[p.name])lb[p.name]={name:p.name,total:0,boss:0,weeks:0,participated:0,totalFights:0};lb[p.name].total+=p.total;lb[p.name].boss+=(p.boss||0);lb[p.name].weeks++;lb[p.name].participated+=(p.participated||0);lb[p.name].totalFights+=(p.totalFights||0);}));
  const lbs=Object.values(lb).sort((a,b)=>b.total-a.total);
  const lbD=document.getElementById('leaderboard-table');
  if(!lbs.length)lbD.innerHTML='<div class="empty">No data yet.</div>';
  else{const cols=7;lbD.innerHTML=`<div class="tscroll"><table><thead><tr><th>#</th><th>PLAYER</th><th>ALL-TIME MEDALS</th><th style="color:#ce93d8">BOSS</th><th>WEEKS</th><th>AVG/WEEK</th><th>PARTICIPATION</th></tr></thead><tbody>
    ${lbs.map((p,i)=>{const pv=p.totalFights>0?Math.round(p.participated/p.totalFights*100):-1;const pc=pv>=0?pv+'%':'—';const pcCls=pv>=0?pctClass(pv):'';return `<tr><td style="font-family:'Rajdhani',sans-serif;font-weight:700;font-size:16px;color:${['#FFD700','#C0C0C0','#CD7F32'][i]||'var(--muted)'};width:44px">${i+1}</td><td class="lb-name" onclick="toggleChart('${esc(p.name).replace(/'/g,"\\'")}')">${esc(p.name)}</td><td style="color:var(--gold);font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700">${p.total.toLocaleString()}</td><td style="color:#ce93d8;font-weight:600">${p.boss.toLocaleString()}</td><td style="color:var(--muted)">${p.weeks}</td><td style="color:var(--gold-light)">${p.weeks>0?Math.round(p.total/p.weeks):0}</td><td class="${pcCls}" style="font-size:12px">${pc}</td></tr><tr><td colspan="${cols}" style="padding:0;border:none"><div class="player-chart-inline" id="chart-${esc(p.name)}" data-player="${esc(p.name)}"><div class="chart-content"></div></div></td></tr>`;}).join('')}
    </tbody></table></div>`;}
}

let openChart=null;
function toggleChart(name){
  const prev=document.querySelector('.player-chart-inline.open');
  if(prev){prev.classList.remove('open');if(prev.dataset.player===name){openChart=null;return;}}
  openChart=name;
  const row=document.getElementById('chart-'+CSS.escape(name));
  if(!row)return;
  const div=row.querySelector('.chart-content');
  const data=[...weeks].reverse().map(w=>{const p=w.players.find(x=>x.name===name);return{label:w.label,clash:p?p.total:0,boss:p?(p.boss||0):0};});
  if(!data.length){div.innerHTML='<div class="empty">No data.</div>';row.classList.add('open');return;}
  const maxC=Math.max(...data.map(d=>d.clash),1);
  const maxB=Math.max(...data.map(d=>d.boss),1);
  const gw=weeks.filter(w=>w.gloryWinners.some(g=>g.name===name));
  const totalClash=data.reduce((s,d)=>s+d.clash,0);
  const totalBoss=data.reduce((s,d)=>s+d.boss,0);
  div.innerHTML=`
    <div style="font-size:13px;margin-bottom:10px;color:var(--muted)">
      Clash: <b style="color:var(--gold)">${totalClash.toLocaleString()}</b> · Boss: <b style="color:#ce93d8">${totalBoss.toLocaleString()}</b>
      ${gw.length?` · 👑 Glory titles: <b style="color:var(--gold)">${gw.length}</b>`:''}
    </div>
    <div class="chart-legend"><span><span class="ldot clash"></span>Clash medals</span><span><span class="ldot boss"></span>Boss medals</span></div>
    <div class="chart-cluster">
      <div class="cluster-section">
        <div class="cluster-label" style="color:var(--accent)">CLASH</div>
        <div class="cbars">${data.map(d=>{const h=Math.round(d.clash/maxC*140);return`<div class="bcol"><div class="bfill" style="height:${h}px" data-tip="${d.clash} — ${d.label}"></div><div class="blbl">${d.label.replace(/Week /,'W')}</div></div>`;}).join('')}</div>
      </div>
      <div class="cluster-section">
        <div class="cluster-label" style="color:#ce93d8">BOSS</div>
        <div class="cbars">${data.map(d=>{const h=Math.round(d.boss/maxB*140);return`<div class="bcol"><div class="bfill boss-bar" style="height:${h}px" data-tip="${d.boss} — ${d.label}"></div><div class="blbl">${d.label.replace(/Week /,'W')}</div></div>`;}).join('')}</div>
      </div>
    </div>`;
  row.classList.add('open');
}

init();
</script>
</body>
</html>
