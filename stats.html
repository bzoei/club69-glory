<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clan Stats · Survivor.io</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root {
  --gold:#FFB800; --gold-light:#FFD54F; --gold-dark:#E65100;
  --boss:#ce93d8; --clash:#ef9a9a;
  --bg:#0a0c14; --bg3:#181c2e; --bg4:#1f2438;
  --surface:#242840; --border:#3a3f5c;
  --text:#e8ecf8; --muted:#7a80a0;
  --accent:#6c63ff; --green:#4caf50; --red:#f44336;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Exo 2',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(108,99,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(108,99,255,.04) 1px,transparent 1px);
  background-size:40px 40px}
@keyframes spin{to{transform:rotate(360deg)}}

header{position:sticky;top:0;z-index:100;background:rgba(10,12,20,.96);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:58px;gap:10px}
.hlogo{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:18px;color:var(--gold);letter-spacing:2px;white-space:nowrap}
.hlogo span{color:var(--muted);font-weight:400}
.badge{background:rgba(76,175,80,.15);border:1px solid rgba(76,175,80,.3);color:var(--green);font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}

.page{position:relative;z-index:1;padding:20px;max-width:900px;margin:0 auto}
.ptitle{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;margin-bottom:4px}
.ptitle span{color:var(--gold)}
.pdesc{color:var(--muted);font-size:13px;margin-bottom:22px}

.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.scard{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
.scard .lbl{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.5px;margin-bottom:4px}
.scard .val{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;color:var(--gold)}
.sec-title{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border);margin-left:6px}

/* Clan comparison panel */
.compare-panel{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:24px}
.compare-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.compare-header h3{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;color:var(--gold)}
.compare-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.compare-controls select{background:var(--bg4);border:1px solid var(--border);color:var(--text);font-family:'Exo 2',sans-serif;font-size:12px;padding:5px 10px;border-radius:8px;cursor:pointer;outline:none}
.compare-controls select:hover{border-color:var(--gold)}
.compare-controls label{font-size:11px;color:var(--muted);font-weight:600}
.compare-tbl{width:100%;border-collapse:collapse}
.compare-tbl th{text-align:left;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;padding:6px 10px;border-bottom:1px solid var(--border)}
.compare-tbl td{padding:6px 10px;font-size:13px;border-bottom:1px solid rgba(58,63,92,.2)}
.compare-tbl tr:last-child td{border-bottom:none}
.compare-tbl .metric-name{font-weight:600;font-size:12px;white-space:nowrap}
.compare-tbl .val-median{color:var(--muted);font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600}
.compare-tbl .val-player{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700}
.compare-tbl .val-player2{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:var(--accent)}
.val-above{color:var(--green)}
.val-below{color:var(--red)}
.val-equal{color:var(--gold)}
.compare-bar-wrap{display:flex;align-items:center;gap:8px;margin-top:2px}
.compare-bar-bg{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;position:relative}
.compare-bar-fill{height:100%;border-radius:3px;transition:width .4s ease}
.compare-bar-marker{position:absolute;top:-2px;width:2px;height:10px;background:var(--text);border-radius:1px;transition:left .4s ease}
.compare-empty{color:var(--muted);font-size:12px;text-align:center;padding:10px}

.whgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-bottom:24px}
.whcard{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px}
.whtop{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--gold);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.gbrow{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.gbrow .nm{font-size:13px;font-weight:600}
.gbrow .mt{font-size:11px;color:var(--muted);margin-left:auto}

.dbt{background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:24px}
.dbt table{width:100%;border-collapse:collapse}
.dbt thead th{background:var(--bg4);padding:8px 10px;text-align:left;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap}
.dbt tbody tr{border-bottom:1px solid rgba(58,63,92,.35)}
.dbt tbody tr:hover{background:var(--bg4)}
.dbt tbody tr:last-child{border-bottom:none}
.dbt td{padding:7px 10px;font-size:12px}
.tscroll{overflow-x:auto}

.cbars{display:flex;align-items:flex-end;gap:4px;height:150px;padding-top:12px}
.bcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;justify-content:flex-end;min-width:22px}
.bfill{width:100%;background:linear-gradient(to top,var(--accent),rgba(108,99,255,.3));border-radius:3px 3px 0 0;min-height:2px;position:relative;cursor:pointer}
.bfill.boss-bar{background:linear-gradient(to top,var(--boss),rgba(206,147,216,.25))}
.bfill.interpolated{opacity:.5;background:linear-gradient(to top,var(--boss),rgba(206,147,216,.15));border:1px dashed rgba(206,147,216,.4);border-bottom:none}
.bfill:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--border);padding:3px 8px;border-radius:6px;font-size:11px;white-space:nowrap;color:var(--text);z-index:10}
.chart-legend{display:flex;gap:14px;font-size:11px;color:var(--muted);margin-bottom:6px}
.chart-legend span{display:flex;align-items:center;gap:4px}
.chart-legend .ldot{width:9px;height:9px;border-radius:2px}
.chart-legend .ldot.clash{background:var(--accent)}
.chart-legend .ldot.boss{background:var(--boss)}
.chart-legend .ldot.interp{background:var(--boss);opacity:.5;border:1px dashed rgba(206,147,216,.6)}
.chart-cluster{display:flex;gap:20px;margin-top:6px}
.chart-cluster .cluster-section{flex:1;min-width:0}
.chart-cluster .cluster-label{font-size:10px;font-weight:700;letter-spacing:.5px;margin-bottom:4px;text-align:center}
.lb-name{font-weight:600;cursor:pointer;transition:color .2s}
.lb-name:hover{color:var(--gold)}
.player-chart-inline{overflow:hidden;transition:max-height .3s ease,padding .3s ease;max-height:0;padding:0 10px}
.player-chart-inline.open{max-height:400px;padding:12px 10px}
.pct-green{color:#4caf50;font-weight:600}
.pct-yellow{color:#ffc107;font-weight:600}
.pct-orange{color:#ff9800;font-weight:600}
.pct-red{color:#f44336;font-weight:600}
.blbl{font-size:8px;color:var(--muted);text-align:center;overflow:hidden;width:100%;white-space:nowrap;text-overflow:ellipsis}

.empty{color:var(--muted);font-size:13px;padding:20px;text-align:center}
.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:40px;color:var(--muted);font-size:14px}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite}

@media(max-width:700px){
  .page{padding:12px}
  header{padding:0 10px}
  .hlogo{font-size:15px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .compare-header{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>

<header>
  <div class="hlogo">⚔ GLORY <span>MANAGER</span></div>
  <div class="badge">📊 Public Stats</div>
</header>

<div class="page">
  <div class="ptitle">Clan <span>Statistics</span></div>
  <div class="pdesc">Live stats from the clan — updated after each weekly scan.</div>

  <div id="loading" class="loading"><div class="spinner"></div> Loading stats from Firebase…</div>

  <div id="content" style="display:none">
    <div class="stats-grid" id="overview-stats"></div>

    <div class="sec-title">📈 Clan Comparison</div>
    <div class="compare-panel" id="compare-panel"></div>

    <div class="sec-title">📅 Weekly History</div>
    <div class="whgrid" id="week-history-grid"></div>
    <div class="sec-title">👑 Glory Hall of Fame</div>
    <div class="dbt" id="glory-hof"></div>
    <div class="sec-title">📊 All-Time Leaderboard <span style="font-size:11px;color:var(--muted);font-weight:400;font-family:'Exo 2',sans-serif">(click a name to see history)</span></div>
    <div class="dbt" id="leaderboard-table"></div>
  </div>
</div>

<script>
const FIREBASE_CONFIG={
  apiKey:"AIzaSyAamx1N1e7bKPhkFsealyB7R-qI7cpqDog",
  authDomain:"glory-manager-b2823.firebaseapp.com",
  projectId:"glory-manager-b2823",
  storageBucket:"glory-manager-b2823.firebasestorage.app",
  messagingSenderId:"568627462037",
  appId:"1:568627462037:web:07f89fa877a3f8fb89009c"
};

let weeks=[];

function esc(s){
  const d=document.createElement('div');d.textContent=s;return d.innerHTML;
}

function pctClass(pct){
  if(pct>=90)return 'pct-green';
  if(pct>=70)return 'pct-yellow';
  if(pct>=50)return 'pct-orange';
  return 'pct-red';
}

function median(arr){
  if(!arr.length)return 0;
  const s=[...arr].sort((a,b)=>a-b);
  const m=Math.floor(s.length/2);
  return s.length%2?s[m]:Math.round((s[m-1]+s[m])/2);
}

// Interpolate missing boss values for the first Boss Phase week
// Only uses a player's own boss medals from other weeks (median).
// If they have no boss data in any other week, no interpolation is done.
function interpolateBoss(weeks){
  if(weeks.length<2) return weeks;
  // Work on chronological order (oldest first)
  const ordered=[...weeks].reverse();
  const firstWeek=ordered[0];
  // Check if first week has mostly zero boss values (Boss Phase wasn't tracked)
  const bossValues=firstWeek.players.map(p=>p.boss||0);
  const nonZeroBoss=bossValues.filter(v=>v>0).length;
  // If more than half have boss>0, boss was tracked — nothing to interpolate
  if(nonZeroBoss > firstWeek.players.length * 0.5) return weeks;
  // Build map of each player's boss medal values from later weeks
  const bossHistory={};
  for(let i=1;i<ordered.length;i++){
    ordered[i].players.forEach(p=>{
      if((p.boss||0)>0){
        if(!bossHistory[p.name]) bossHistory[p.name]=[];
        bossHistory[p.name].push(p.boss);
      }
    });
  }
  // Interpolate using only that player's own boss medals from other weeks
  firstWeek.players.forEach(p=>{
    if((p.boss||0)===0){
      const hist=bossHistory[p.name];
      if(hist&&hist.length){
        p.boss=median(hist);
        p._bossInterpolated=true;
      }
    }
  });
  return weeks;
}

async function init(){
  try{
    const app=firebase.initializeApp(FIREBASE_CONFIG);
    const db=firebase.firestore(app);
    const snap=await db.collection('glory').doc('weeks').get();
    if(snap.exists && snap.data().list) weeks=snap.data().list;
  }catch(e){
    console.error('Firebase error:',e);
    document.getElementById('loading').innerHTML='<span style="color:var(--red)">Could not load data. Please try again later.</span>';
    return;
  }
  weeks=interpolateBoss(weeks);
  document.getElementById('loading').style.display='none';
  document.getElementById('content').style.display='block';
  renderStats();
}

function renderStats(){
  const allP=new Set();let totM=0;
  weeks.forEach(w=>w.players.forEach(p=>{allP.add(p.name);totM+=p.total;}));
  document.getElementById('overview-stats').innerHTML=`
    <div class="scard"><div class="lbl">WEEKS TRACKED</div><div class="val">${weeks.length}</div></div>
    <div class="scard"><div class="lbl">UNIQUE PLAYERS</div><div class="val">${allP.size}</div></div>
    <div class="scard"><div class="lbl">TOTAL MEDALS</div><div class="val">${totM.toLocaleString()}</div></div>
    <div class="scard"><div class="lbl">GLORY TITLES</div><div class="val">${weeks.reduce((s,w)=>s+w.gloryWinners.length,0)}</div></div>`;

  renderComparePanel();

  const wh=document.getElementById('week-history-grid');
  if(!weeks.length)wh.innerHTML='<div class="empty">No weeks saved yet.</div>';
  else wh.innerHTML=weeks.map(w=>`
    <div class="whcard">
      <div class="whtop"><span>🗓 ${esc(w.label)}</span><span style="font-size:11px;color:var(--muted)">${w.date}</span></div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px">${w.players.length} members · ${w.players.reduce((s,p)=>s+p.total,0).toLocaleString()} medals</div>
      <div style="font-size:10px;font-weight:700;color:var(--muted);margin-bottom:5px">GLORY MEMBERS</div>
      ${w.gloryWinners.map((g,i)=>`<div class="gbrow"><span>${['🥇','🥈','🥉'][i]}</span><span class="nm">${esc(g.name)}</span><span class="mt">${g.medals} 🏅</span></div>`).join('')}
    </div>`).join('');

  const counts={};weeks.forEach(w=>w.gloryWinners.forEach(g=>{counts[g.name]=(counts[g.name]||0)+1;}));
  const hof=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const hofD=document.getElementById('glory-hof');
  if(!hof.length)hofD.innerHTML='<div class="empty">No glory members yet.</div>';
  else hofD.innerHTML=`<div class="tscroll"><table><thead><tr><th>#</th><th>PLAYER</th><th>GLORY TITLES</th><th></th></tr></thead><tbody>
    ${hof.map(([n,c],i)=>`<tr><td style="font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;color:${['#FFD700','#C0C0C0','#CD7F32'][i]||'var(--muted)'};width:36px">${i+1}</td><td style="font-weight:600">${esc(n)}</td><td style="color:var(--gold);font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700">${c} 👑</td><td>${'⭐'.repeat(Math.min(c,10))}</td></tr>`).join('')}
    </tbody></table></div>`;

  renderLeaderboard();
}

function renderLeaderboard(){
  const lb={};weeks.forEach(w=>w.players.forEach(p=>{if(!lb[p.name])lb[p.name]={name:p.name,total:0,boss:0,weeks:0,participated:0,totalFights:0};lb[p.name].total+=p.total;lb[p.name].boss+=(p.boss||0);lb[p.name].weeks++;lb[p.name].participated+=(p.participated||0);lb[p.name].totalFights+=(p.totalFights||0);}));
  const lbs=Object.values(lb).sort((a,b)=>b.total-a.total);
  const lbD=document.getElementById('leaderboard-table');
  if(!lbs.length){lbD.innerHTML='<div class="empty">No data yet.</div>';return;}
  const cols=7;
  lbD.innerHTML=`<div class="tscroll"><table><thead><tr><th>#</th><th>PLAYER</th><th>ALL-TIME</th><th style="color:var(--boss)">BOSS</th><th>WKS</th><th>AVG/WK</th><th>PART.</th></tr></thead><tbody>
    ${lbs.map((p,i)=>{const pv=p.totalFights>0?Math.round(p.participated/p.totalFights*100):-1;const pc=pv>=0?pv+'%':'—';const pcCls=pv>=0?pctClass(pv):'';return `<tr><td style="font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;color:${['#FFD700','#C0C0C0','#CD7F32'][i]||'var(--muted)'};width:32px">${i+1}</td><td class="lb-name" onclick="toggleChart('${esc(p.name).replace(/'/g,"\\'")}')">${esc(p.name)}</td><td style="color:var(--gold);font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700">${p.total.toLocaleString()}</td><td style="color:var(--boss);font-weight:600;font-size:12px">${p.boss.toLocaleString()}</td><td style="color:var(--muted);font-size:12px">${p.weeks}</td><td style="color:var(--gold-light);font-size:12px">${p.weeks>0?Math.round(p.total/p.weeks):0}</td><td class="${pcCls}" style="font-size:11px">${pc}</td></tr><tr><td colspan="${cols}" style="padding:0;border:none"><div class="player-chart-inline" id="chart-${esc(p.name)}" data-player="${esc(p.name)}"><div class="chart-content"></div></div></td></tr>`;}).join('')}
    </tbody></table></div>`;
}

// --- Clan comparison panel ---
function renderComparePanel(){
  const panel=document.getElementById('compare-panel');
  if(!weeks.length){panel.innerHTML='<div class="compare-empty">No data yet.</div>';return;}

  const allNames=new Set();
  weeks.forEach(w=>w.players.forEach(p=>allNames.add(p.name)));
  const sortedNames=[...allNames].sort((a,b)=>a.localeCompare(b));

  panel.innerHTML=`
    <div class="compare-header">
      <h3>📈 Compare against clan medians</h3>
      <div class="compare-controls">
        <label>Player 1:</label>
        <select id="cmp-player1"><option value="">-- select --</option>${sortedNames.map(n=>`<option value="${esc(n)}">${esc(n)}</option>`).join('')}</select>
        <label>vs</label>
        <select id="cmp-player2"><option value="">Clan Median</option>${sortedNames.map(n=>`<option value="${esc(n)}">${esc(n)}</option>`).join('')}</select>
      </div>
    </div>
    <div id="cmp-body"></div>`;

  document.getElementById('cmp-player1').addEventListener('change',updateCompare);
  document.getElementById('cmp-player2').addEventListener('change',updateCompare);
  updateCompare();
}

function updateCompare(){
  const body=document.getElementById('cmp-body');
  const p1Name=document.getElementById('cmp-player1').value;
  const p2Name=document.getElementById('cmp-player2').value;

  if(!p1Name){
    // Show clan median overview when no player selected
    body.innerHTML=renderClanMedianOverview();
    return;
  }

  // Compute per-week stats for player(s)
  const orderedWeeks=[...weeks].reverse(); // chronological
  const p1Stats=getPlayerWeeklyStats(p1Name,orderedWeeks);
  const clanMedians=getClanMedians(orderedWeeks);

  let p2Stats=null;
  if(p2Name){
    p2Stats=getPlayerWeeklyStats(p2Name,orderedWeeks);
  }
  const compareTarget=p2Stats||clanMedians;
  const compareLabel=p2Name||'Clan Median';

  const metrics=[
    {key:'clash',label:'Clash Medals',color:'var(--gold)'},
    {key:'boss',label:'Boss Medals',color:'var(--boss)'},
    {key:'participation',label:'Participation %',color:'var(--green)',isPct:true},
  ];

  let rows='';
  metrics.forEach(m=>{
    const p1Vals=p1Stats.map(s=>s[m.key]);
    const cVals=compareTarget.map(s=>s[m.key]);
    // Per-week mini comparison
    const weekCells=orderedWeeks.map((_,i)=>{
      const v1=p1Vals[i]!=null?p1Vals[i]:null;
      const v2=cVals[i]!=null?cVals[i]:null;
      if(v1===null)return `<td style="color:var(--muted);font-size:11px;text-align:center">—</td>`;
      const cls=v2!==null?(v1>v2?'val-above':v1<v2?'val-below':'val-equal'):'';
      const display=m.isPct?(v1+'%'):v1.toLocaleString();
      return `<td class="val-player ${cls}" style="font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;text-align:center">${display}</td>`;
    }).join('');

    // Summary: avg
    const p1Avg=p1Vals.filter(v=>v!==null);
    const cAvg=cVals.filter(v=>v!==null);
    const p1Mean=p1Avg.length?Math.round(p1Avg.reduce((s,v)=>s+v,0)/p1Avg.length):0;
    const cMean=cAvg.length?Math.round(cAvg.reduce((s,v)=>s+v,0)/cAvg.length):0;
    const avgCls=p1Mean>cMean?'val-above':p1Mean<cMean?'val-below':'val-equal';
    const avgDisplay=m.isPct?(p1Mean+'%'):p1Mean.toLocaleString();
    const cDisplay=m.isPct?(cMean+'%'):cMean.toLocaleString();

    // Bar visualization
    const maxVal=Math.max(p1Mean,cMean,1);
    const p1Pct=Math.round(p1Mean/maxVal*100);
    const cPct=Math.round(cMean/maxVal*100);

    rows+=`<tr>
      <td class="metric-name" style="color:${m.color}">${m.label}</td>
      ${weekCells}
      <td style="text-align:center"><span class="val-median">${cDisplay}</span></td>
      <td style="text-align:center"><span class="val-player ${avgCls}" style="font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700">${avgDisplay}</span>
        <div class="compare-bar-wrap">
          <div class="compare-bar-bg">
            <div class="compare-bar-fill" style="width:${p1Pct}%;background:${m.color}"></div>
            <div class="compare-bar-marker" style="left:${cPct}%"></div>
          </div>
        </div>
      </td>
    </tr>`;
  });

  const weekHeaders=orderedWeeks.map(w=>`<th style="text-align:center;font-size:9px">${w.label.replace(/Week /,'W').replace(/ ·.*/,'')}</th>`).join('');

  body.innerHTML=`
    <div class="tscroll">
    <table class="compare-tbl">
      <thead><tr><th>Metric</th>${weekHeaders}<th style="text-align:center">${esc(compareLabel)}</th><th style="text-align:center">${esc(p1Name)}</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    </div>
    <div style="font-size:10px;color:var(--muted);margin-top:8px;display:flex;gap:14px">
      <span><span style="color:var(--green)">Green</span> = above target</span>
      <span><span style="color:var(--red)">Red</span> = below target</span>
      <span>| = target avg</span>
    </div>`;
}

function renderClanMedianOverview(){
  const orderedWeeks=[...weeks].reverse();
  const clanMedians=getClanMedians(orderedWeeks);
  const weekHeaders=orderedWeeks.map(w=>`<th style="text-align:center;font-size:9px">${w.label.replace(/Week /,'W').replace(/ ·.*/,'')}</th>`).join('');

  const metrics=[
    {key:'clash',label:'Clash Medals',color:'var(--gold)'},
    {key:'boss',label:'Boss Medals',color:'var(--boss)'},
    {key:'participation',label:'Participation %',color:'var(--green)',isPct:true},
  ];

  let rows='';
  metrics.forEach(m=>{
    const vals=clanMedians.map(s=>s[m.key]);
    const cells=vals.map(v=>{
      if(v===null)return `<td style="color:var(--muted);font-size:11px;text-align:center">—</td>`;
      const display=m.isPct?(v+'%'):v.toLocaleString();
      return `<td class="val-median" style="text-align:center">${display}</td>`;
    }).join('');
    const avg=vals.filter(v=>v!==null);
    const mean=avg.length?Math.round(avg.reduce((s,v)=>s+v,0)/avg.length):0;
    const display=m.isPct?(mean+'%'):mean.toLocaleString();
    rows+=`<tr><td class="metric-name" style="color:${m.color}">${m.label}</td>${cells}<td class="val-median" style="text-align:center;font-weight:700">${display}</td></tr>`;
  });

  return `
    <div style="font-size:12px;color:var(--muted);margin-bottom:10px">Select a player above to compare against the clan median — or against another member.</div>
    <div class="tscroll">
    <table class="compare-tbl">
      <thead><tr><th>Metric</th>${weekHeaders}<th style="text-align:center">Avg</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    </div>`;
}

function getPlayerWeeklyStats(name,orderedWeeks){
  return orderedWeeks.map(w=>{
    const p=w.players.find(x=>x.name===name);
    if(!p)return {clash:null,boss:null,participation:null};
    const pct=p.totalFights>0?Math.round(p.participated/p.totalFights*100):null;
    return {clash:p.total,boss:p.boss||0,participation:pct};
  });
}

function getClanMedians(orderedWeeks){
  return orderedWeeks.map(w=>{
    const clashVals=w.players.map(p=>p.total).filter(v=>v>0);
    const bossVals=w.players.map(p=>p.boss||0).filter(v=>v>0);
    const pctVals=w.players.filter(p=>p.totalFights>0).map(p=>Math.round(p.participated/p.totalFights*100));
    return {
      clash:median(clashVals),
      boss:median(bossVals),
      participation:median(pctVals)
    };
  });
}

// --- Player chart ---
let openChart=null;
function toggleChart(name){
  const prev=document.querySelector('.player-chart-inline.open');
  if(prev){prev.classList.remove('open');if(prev.dataset.player===name){openChart=null;return;}}
  openChart=name;
  const row=document.getElementById('chart-'+CSS.escape(name));
  if(!row)return;
  const div=row.querySelector('.chart-content');
  const data=[...weeks].reverse().map(w=>{
    const p=w.players.find(x=>x.name===name);
    return {label:w.label,clash:p?p.total:0,boss:p?(p.boss||0):0,bossInterpolated:p?!!p._bossInterpolated:false};
  });
  if(!data.length){div.innerHTML='<div class="empty">No data.</div>';row.classList.add('open');return;}
  const maxC=Math.max(...data.map(d=>d.clash),1);
  const maxB=Math.max(...data.map(d=>d.boss),1);
  const gw=weeks.filter(w=>w.gloryWinners.some(g=>g.name===name));
  const totalClash=data.reduce((s,d)=>s+d.clash,0);
  const totalBoss=data.reduce((s,d)=>s+d.boss,0);
  const hasInterp=data.some(d=>d.bossInterpolated);
  div.innerHTML=`
    <div style="font-size:12px;margin-bottom:8px;color:var(--muted)">
      Clash: <b style="color:var(--gold)">${totalClash.toLocaleString()}</b> · Boss: <b style="color:var(--boss)">${totalBoss.toLocaleString()}</b>
      ${gw.length?` · 👑 Glory titles: <b style="color:var(--gold)">${gw.length}</b>`:''}
    </div>
    <div class="chart-legend">
      <span><span class="ldot clash"></span>Clash</span>
      <span><span class="ldot boss"></span>Boss</span>
      ${hasInterp?'<span><span class="ldot interp"></span>Estimated</span>':''}
    </div>
    <div class="chart-cluster">
      <div class="cluster-section">
        <div class="cluster-label" style="color:var(--accent)">CLASH</div>
        <div class="cbars">${data.map(d=>{const h=Math.round(d.clash/maxC*120);return`<div class="bcol"><div class="bfill" style="height:${h}px" data-tip="${d.clash} — ${d.label}"></div><div class="blbl">${d.label.replace(/Week /,'W').replace(/ ·.*/,'')}</div></div>`;}).join('')}</div>
      </div>
      <div class="cluster-section">
        <div class="cluster-label" style="color:var(--boss)">BOSS</div>
        <div class="cbars">${data.map(d=>{const h=Math.round(d.boss/maxB*120);const interpCls=d.bossInterpolated?' interpolated':'';return`<div class="bcol"><div class="bfill boss-bar${interpCls}" style="height:${h}px" data-tip="${d.boss}${d.bossInterpolated?' (est.)':''} — ${d.label}"></div><div class="blbl">${d.label.replace(/Week /,'W').replace(/ ·.*/,'')}</div></div>`;}).join('')}</div>
      </div>
    </div>`;
  row.classList.add('open');
}

init();
</script>
</body>
</html>
