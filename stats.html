<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clan Stats · Survivor.io</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root {
  --gold:#FFB800; --gold-light:#FFD54F; --gold-dark:#E65100;
  --boss:#ce93d8; --clash:#ef9a9a;
  --bg:#0a0c14; --bg3:#181c2e; --bg4:#1f2438;
  --surface:#242840; --border:#3a3f5c;
  --text:#e8ecf8; --muted:#7a80a0;
  --accent:#6c63ff; --green:#4caf50; --red:#f44336;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Exo 2',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(108,99,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(108,99,255,.04) 1px,transparent 1px);
  background-size:40px 40px}
@keyframes spin{to{transform:rotate(360deg)}}

header{position:sticky;top:0;z-index:100;background:rgba(10,12,20,.96);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:58px;gap:10px}
.hlogo{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:18px;color:var(--gold);letter-spacing:2px;white-space:nowrap}
.hlogo span{color:var(--muted);font-weight:400}
.badge{background:rgba(76,175,80,.15);border:1px solid rgba(76,175,80,.3);color:var(--green);font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}

.page{position:relative;z-index:1;padding:20px;max-width:900px;margin:0 auto}
.ptitle{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;margin-bottom:4px}
.ptitle span{color:var(--gold)}
.pdesc{color:var(--muted);font-size:13px;margin-bottom:16px}

/* ── TABS ── */
.tab-nav{display:flex;gap:4px;margin-bottom:20px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.tab-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;letter-spacing:.5px;padding:8px 16px;border-radius:8px;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}
.tab-btn:hover{color:var(--text);border-color:var(--text)}
.tab-btn.active{color:var(--gold);border-color:var(--gold);background:rgba(255,184,0,.08)}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ── STATS CARDS ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.scard{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.scard .lbl{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.5px;margin-bottom:3px}
.scard .val{font-family:'Rajdhani',sans-serif;font-size:24px;font-weight:700;color:var(--gold)}

/* ── LEADERBOARD ── */
.lb-list{display:flex;flex-direction:column;gap:6px}
.lb-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .2s}
.lb-card:hover{border-color:rgba(255,184,0,.3)}
.lb-row{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.lb-rank{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:16px;min-width:28px;text-align:center}
.lb-rank.r1{color:#FFD700}.lb-rank.r2{color:#C0C0C0}.lb-rank.r3{color:#CD7F32}.lb-rank.rn{color:var(--muted)}
.lb-info{flex:1;min-width:0}
.lb-pname{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .2s}
.lb-pname:hover{color:var(--gold)}
.lb-meta{display:flex;gap:12px;margin-top:3px;flex-wrap:wrap}
.lb-medal{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;display:flex;align-items:center;gap:3px}
.lb-medal.boss{color:var(--boss)}
.lb-medal.clash{color:var(--gold)}
.lb-delta{font-size:11px;font-weight:700;padding:1px 6px;border-radius:4px}
.lb-delta.up{color:var(--green);background:rgba(76,175,80,.12)}
.lb-delta.down{color:var(--red);background:rgba(244,67,54,.12)}
.lb-delta.flat{color:var(--muted);background:var(--bg4)}
.lb-delta.new-tag{color:var(--accent);background:rgba(108,99,255,.12)}
.lb-right{text-align:right;flex-shrink:0}
.lb-part{font-size:12px;font-weight:600}
.lb-weeks{font-size:10px;color:var(--muted)}
.lb-inactive .lb-pname{text-decoration:line-through;color:var(--muted)}
.lb-inactive .lb-medal{opacity:.45}

/* ── PLAYER CHART (expand) ── */
.lb-expand{max-height:0;overflow:hidden;transition:max-height .35s ease,padding .25s ease;padding:0 14px;background:var(--bg4)}
.lb-expand.open{max-height:500px;padding:14px}
.chart-legend{display:flex;gap:14px;font-size:11px;color:var(--muted);margin-bottom:6px}
.chart-legend span{display:flex;align-items:center;gap:4px}
.chart-legend .ldot{width:9px;height:9px;border-radius:2px}
.chart-legend .ldot.boss{background:var(--boss)}
.chart-legend .ldot.clash{background:var(--accent)}
.cbars{display:flex;align-items:flex-end;gap:4px;height:120px;padding-top:10px}
.bcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;justify-content:flex-end;min-width:18px}
.bfill{width:100%;border-radius:3px 3px 0 0;min-height:2px;position:relative;cursor:pointer;transition:opacity .15s}
.bfill:hover{opacity:.8}
.bfill.boss-bar{background:linear-gradient(to top,var(--boss),rgba(206,147,216,.25))}
.bfill.clash-bar{background:linear-gradient(to top,var(--accent),rgba(108,99,255,.3))}
.bfill:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);padding:3px 8px;border-radius:6px;font-size:10px;white-space:nowrap;color:var(--text);z-index:10}
.blbl{font-size:8px;color:var(--muted);text-align:center;overflow:hidden;width:100%;white-space:nowrap;text-overflow:ellipsis}
.chart-cluster{display:flex;gap:16px;margin-top:6px}
.chart-cluster .cluster-section{flex:1;min-width:0}
.chart-cluster .cluster-label{font-size:10px;font-weight:700;letter-spacing:.5px;margin-bottom:4px;text-align:center}
.chart-summary{font-size:12px;color:var(--muted);margin-bottom:8px}
.chart-summary b{color:var(--gold)}
.chart-summary .boss-val{color:var(--boss)}

.sec-title{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border);margin-left:6px}

/* ── INSIGHTS ── */
.insight-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:20px}
.insight-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px}
.insight-card .ic-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.5px;margin-bottom:6px}
.insight-card .ic-name{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--gold)}
.insight-card .ic-detail{font-size:12px;color:var(--muted);margin-top:2px}
.insight-card.boss-card{border-left:3px solid var(--boss)}
.insight-card.clash-card{border-left:3px solid var(--accent)}
.insight-card.trend-card{border-left:3px solid var(--green)}
.trend-chart-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:20px}
.compare-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:20px}
.compare-selects{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.compare-selects select{background:var(--bg4);border:1px solid var(--border);color:var(--text);font-family:'Exo 2',sans-serif;font-size:12px;padding:6px 10px;border-radius:8px;cursor:pointer;outline:none;max-width:160px}
.compare-selects label{font-size:11px;color:var(--muted);font-weight:600}
.compare-side{display:flex;gap:16px;flex-wrap:wrap}
.compare-side .cs-col{flex:1;min-width:200px}
.cs-header{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--gold);margin-bottom:8px;text-align:center}
.cs-stat{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(58,63,92,.2);font-size:12px}
.cs-stat:last-child{border-bottom:none}
.cs-stat .csl{color:var(--muted)}

/* ── HISTORY ── */
.whgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin-bottom:20px}
.whcard{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px}
.whtop{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--gold);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.gbrow{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.gbrow .nm{font-size:13px;font-weight:600}
.gbrow .mt{font-size:11px;color:var(--muted);margin-left:auto}

/* ── HALL OF FAME ── */
.hof-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.hof-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.hof-rank{font-size:20px;margin-bottom:2px}
.hof-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hof-count{font-size:12px;color:var(--muted);margin-top:2px}

.pct-green{color:#4caf50;font-weight:600}
.pct-yellow{color:#ffc107;font-weight:600}
.pct-orange{color:#ff9800;font-weight:600}
.pct-red{color:#f44336;font-weight:600}
.empty{color:var(--muted);font-size:13px;padding:20px;text-align:center}
.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:40px;color:var(--muted);font-size:14px}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite}
.show-more-btn{background:var(--bg4);border:1px solid var(--border);color:var(--gold);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;padding:8px 22px;border-radius:8px;cursor:pointer;letter-spacing:.5px;transition:border-color .2s}
.show-more-btn:hover{border-color:var(--gold)}

@media(max-width:700px){
  .page{padding:12px}
  header{padding:0 10px}
  .hlogo{font-size:15px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .tab-nav{gap:3px}
  .tab-btn{font-size:12px;padding:7px 10px}
  .lb-row{padding:8px 10px;gap:8px}
  .lb-meta{gap:8px}
  .chart-cluster{flex-direction:column;gap:10px}
  .insight-grid{grid-template-columns:1fr 1fr}
  .compare-side{flex-direction:column}
  .hof-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}
}
@media(max-width:400px){
  .insight-grid{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<header>
  <div class="hlogo">⚔ GLORY <span>MANAGER</span></div>
  <div class="badge">📊 Public Stats</div>
</header>

<div class="page">
  <div class="ptitle">Clan <span>Statistics</span></div>
  <div class="pdesc">Live stats — updated after each weekly scan.</div>

  <div id="loading" class="loading"><div class="spinner"></div> Loading stats from Firebase…</div>

  <div id="content" style="display:none">
    <div class="stats-grid" id="overview-stats"></div>

    <div class="tab-nav" id="tab-nav">
      <button class="tab-btn active" data-tab="leaderboard">Leaderboard</button>
      <button class="tab-btn" data-tab="insights">Weekly Insights</button>
      <button class="tab-btn" data-tab="history">History</button>
      <button class="tab-btn" data-tab="hof">Hall of Fame</button>
    </div>

    <div class="tab-panel active" id="panel-leaderboard">
      <div class="sec-title">📊 All-Time Leaderboard <span style="font-size:11px;color:var(--muted);font-weight:400;font-family:'Exo 2',sans-serif">(tap a name to see charts)</span></div>
      <div id="leaderboard-list" class="lb-list"></div>
    </div>

    <div class="tab-panel" id="panel-insights">
      <div class="sec-title">🏆 This Week's Highlights</div>
      <div id="insights-highlights" class="insight-grid"></div>
      <div class="sec-title">📈 Clan Trends</div>
      <div id="insights-trends" class="trend-chart-wrap"></div>
      <div class="sec-title">🔀 Compare Players</div>
      <div id="insights-compare" class="compare-wrap"></div>
    </div>

    <div class="tab-panel" id="panel-history">
      <div class="sec-title">📅 Weekly History</div>
      <div id="week-history-grid" class="whgrid"></div>
      <div id="week-history-toggle" style="text-align:center;margin-top:10px;display:none">
        <button class="show-more-btn" id="wh-toggle-btn" onclick="toggleWeekHistory()">▼ Show all weeks</button>
      </div>
    </div>

    <div class="tab-panel" id="panel-hof">
      <div class="sec-title">👑 Glory Hall of Fame</div>
      <div id="glory-hof" class="hof-grid"></div>
    </div>
  </div>
</div>

<script>
const FIREBASE_CONFIG={
  apiKey:"AIzaSyAamx1N1e7bKPhkFsealyB7R-qI7cpqDog",
  authDomain:"glory-manager-b2823.firebaseapp.com",
  projectId:"glory-manager-b2823",
  storageBucket:"glory-manager-b2823.firebasestorage.app",
  messagingSenderId:"568627462037",
  appId:"1:568627462037:web:07f89fa877a3f8fb89009c"
};

let weeks=[];

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function safeId(name){return 'p_'+name.replace(/[^a-zA-Z0-9]/g,'_');}
function pctClass(pct){
  if(pct>=90)return 'pct-green';
  if(pct>=70)return 'pct-yellow';
  if(pct>=50)return 'pct-orange';
  return 'pct-red';
}
function median(arr){
  if(!arr.length)return 0;
  const s=[...arr].sort((a,b)=>a-b);
  const m=Math.floor(s.length/2);
  return s.length%2?s[m]:Math.round((s[m-1]+s[m])/2);
}

// ── TABS ──
document.getElementById('tab-nav').addEventListener('click',e=>{
  const btn=e.target.closest('.tab-btn');
  if(!btn)return;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+btn.dataset.tab).classList.add('active');
});

// ── FIREBASE INIT ──
async function init(){
  try{
    const app=firebase.initializeApp(FIREBASE_CONFIG);
    const db=firebase.firestore(app);
    const snap=await db.collection('glory').doc('weeks').get();
    if(snap.exists && snap.data().list) weeks=snap.data().list;
  }catch(e){
    console.error('Firebase error:',e);
    document.getElementById('loading').innerHTML='<span style="color:var(--red)">Could not load data.</span>';
    return;
  }
  document.getElementById('loading').style.display='none';
  document.getElementById('content').style.display='block';
  renderAll();
}

function renderAll(){
  renderOverview();
  renderLeaderboard();
  renderInsights();
  renderHistory();
  renderHOF();
}

// ── OVERVIEW STATS ──
function renderOverview(){
  const allP=new Set();let totM=0,totBoss=0;
  weeks.forEach(w=>w.players.forEach(p=>{allP.add(p.name);totM+=p.total;totBoss+=(p.boss||0);}));
  document.getElementById('overview-stats').innerHTML=`
    <div class="scard"><div class="lbl">WEEKS TRACKED</div><div class="val">${weeks.length}</div></div>
    <div class="scard"><div class="lbl">UNIQUE PLAYERS</div><div class="val">${allP.size}</div></div>
    <div class="scard"><div class="lbl">BOSS MEDALS</div><div class="val">${totBoss.toLocaleString()}</div></div>
    <div class="scard"><div class="lbl">CLASH MEDALS</div><div class="val">${totM.toLocaleString()}</div></div>`;
}

// ── BOSS DELTA CALCULATION ──
function getBossDelta(playerName){
  const pw=weeks.filter(w=>w.players.find(p=>p.name===playerName&&!p.exempt&&(p.boss||0)>0));
  if(pw.length<2)return null;
  const latest=pw[0].players.find(p=>p.name===playerName);
  const prev=pw[1].players.find(p=>p.name===playerName);
  const lb=latest.boss||0,pb=prev.boss||0;
  if(pb===0)return null;
  return ((lb-pb)/pb*100);
}

// ── LEADERBOARD ──
function renderLeaderboard(){
  const lb={};
  weeks.forEach(w=>w.players.forEach(p=>{
    if(!lb[p.name])lb[p.name]={name:p.name,total:0,boss:0,weeks:0,participated:0,totalFights:0};
    if(!p.exempt){lb[p.name].total+=p.total;lb[p.name].boss+=(p.boss||0);lb[p.name].weeks++;
      lb[p.name].participated+=(p.participated||0);lb[p.name].totalFights+=(p.totalFights||0);}
  }));
  const latestNames=new Set(weeks.length?weeks[0].players.map(p=>p.name):[]);
  const lbs=Object.values(lb).sort((a,b)=>b.total-a.total);
  const container=document.getElementById('leaderboard-list');
  if(!lbs.length){container.innerHTML='<div class="empty">No data yet.</div>';return;}

  container.innerHTML=lbs.map((p,i)=>{
    const inactive=!latestNames.has(p.name);
    const pv=p.totalFights>0?Math.round(p.participated/p.totalFights*100):-1;
    const pc=pv>=0?pv+'%':'—';
    const pcCls=pv>=0?pctClass(pv):'';
    const rkCls=i===0?'r1':i===1?'r2':i===2?'r3':'rn';
    const avg=p.weeks>0?Math.round(p.total/p.weeks):0;
    const delta=getBossDelta(p.name);
    let deltaHtml='';
    if(delta===null){
      const hasAnyBoss=weeks.some(w=>w.players.find(x=>x.name===p.name&&(x.boss||0)>0));
      deltaHtml=hasAnyBoss?'':'<span class="lb-delta new-tag">NEW</span>';
    }else if(delta>0) deltaHtml=`<span class="lb-delta up">+${delta.toFixed(1)}%</span>`;
    else if(delta<0) deltaHtml=`<span class="lb-delta down">${delta.toFixed(1)}%</span>`;
    else deltaHtml='<span class="lb-delta flat">0.0%</span>';

    return `<div class="lb-card${inactive?' lb-inactive':''}">
      <div class="lb-row" onclick="toggleChart('${safeId(p.name)}','${esc(p.name).replace(/'/g,"\\'")}')">
        <div class="lb-rank ${rkCls}">${i+1}</div>
        <div class="lb-info">
          <div class="lb-pname">${esc(p.name)}</div>
          <div class="lb-meta">
            <span class="lb-medal boss">🏰 ${p.boss.toLocaleString()} ${deltaHtml}</span>
            <span class="lb-medal clash">⚔ ${p.total.toLocaleString()}</span>
            <span style="font-size:11px;color:var(--muted)">~${avg}/wk</span>
          </div>
        </div>
        <div class="lb-right">
          <div class="lb-part ${pcCls}">${pc}</div>
          <div class="lb-weeks">${p.weeks} wk${p.weeks!==1?'s':''}</div>
        </div>
      </div>
      <div class="lb-expand" id="chart-${safeId(p.name)}"><div class="chart-inner"></div></div>
    </div>`;
  }).join('');
}

// ── PLAYER CHART TOGGLE ──
let openChart=null;
function toggleChart(sid,name){
  const prev=document.querySelector('.lb-expand.open');
  if(prev){prev.classList.remove('open');if(prev.id==='chart-'+sid){openChart=null;return;}}
  openChart=sid;
  const el=document.getElementById('chart-'+sid);
  if(!el)return;
  const div=el.querySelector('.chart-inner');
  const data=[...weeks].reverse().map(w=>{const p=w.players.find(x=>x.name===name);return{label:w.label,clash:p?p.total:0,boss:p?(p.boss||0):0};});
  if(!data.length){div.innerHTML='<div class="empty">No data.</div>';el.classList.add('open');return;}
  const maxB=Math.max(...data.map(d=>d.boss),1);
  const maxC=Math.max(...data.map(d=>d.clash),1);
  const gw=weeks.filter(w=>w.gloryWinners.some(g=>g.name===name));
  const totalBoss=data.reduce((s,d)=>s+d.boss,0);
  const totalClash=data.reduce((s,d)=>s+d.clash,0);

  // Boss weekly deltas
  let bossDeltas='';
  for(let i=1;i<data.length;i++){
    if(data[i-1].boss>0&&data[i].boss>0){
      const d=((data[i].boss-data[i-1].boss)/data[i-1].boss*100);
      bossDeltas+=`<span style="font-size:10px;color:${d>=0?'var(--green)':'var(--red)'}">${data[i].label.replace(/Week /,'W').replace(/ ·.*/,'')}: ${d>=0?'+':''}${d.toFixed(1)}%</span> `;
    }
  }

  div.innerHTML=`
    <div class="chart-summary">
      Boss: <b class="boss-val">${totalBoss.toLocaleString()}</b> · Clash: <b>${totalClash.toLocaleString()}</b>
      ${gw.length?` · 👑 Glory: <b>${gw.length}</b>`:''}
    </div>
    ${bossDeltas?`<div style="margin-bottom:8px;line-height:1.8">${bossDeltas}</div>`:''}
    <div class="chart-legend"><span><span class="ldot boss"></span>Boss</span><span><span class="ldot clash"></span>Clash</span></div>
    <div class="chart-cluster">
      <div class="cluster-section">
        <div class="cluster-label" style="color:var(--boss)">BOSS</div>
        <div class="cbars">${data.map(d=>{const h=Math.round(d.boss/maxB*100);return`<div class="bcol"><div class="bfill boss-bar" style="height:${h}px" data-tip="${d.boss} — ${d.label}"></div><div class="blbl">${d.label.replace(/Week /,'W').replace(/ ·.*/,'')}</div></div>`;}).join('')}</div>
      </div>
      <div class="cluster-section">
        <div class="cluster-label" style="color:var(--accent)">CLASH</div>
        <div class="cbars">${data.map(d=>{const h=Math.round(d.clash/maxC*100);return`<div class="bcol"><div class="bfill clash-bar" style="height:${h}px" data-tip="${d.clash} — ${d.label}"></div><div class="blbl">${d.label.replace(/Week /,'W').replace(/ ·.*/,'')}</div></div>`;}).join('')}</div>
      </div>
    </div>`;
  el.classList.add('open');
}

// ── INSIGHTS ──
function renderInsights(){
  const hl=document.getElementById('insights-highlights');
  const trends=document.getElementById('insights-trends');
  const cmp=document.getElementById('insights-compare');

  if(!weeks.length){
    hl.innerHTML='<div class="empty">No data yet.</div>';
    trends.innerHTML='<div class="empty">No trend data yet.</div>';
    cmp.innerHTML='<div class="empty">Need data to compare.</div>';
    return;
  }

  // This week highlights
  const latest=weeks[0];
  const prev=weeks.length>1?weeks[1]:null;
  const active=latest.players.filter(p=>!p.exempt);

  // Top boss
  const topBoss=[...active].sort((a,b)=>(b.boss||0)-(a.boss||0)).slice(0,3);
  // Top clash
  const topClash=[...active].sort((a,b)=>b.total-a.total).slice(0,3);

  // Biggest boss improvement
  let biggestMover=null;
  if(prev){
    let bestDelta=-Infinity,bestName='';
    active.forEach(p=>{
      const pp=prev.players.find(x=>x.name===p.name&&!x.exempt);
      if(pp&&(pp.boss||0)>0&&(p.boss||0)>0){
        const d=((p.boss-pp.boss)/pp.boss*100);
        if(d>bestDelta){bestDelta=d;bestName=p.name;}
      }
    });
    if(bestName)biggestMover={name:bestName,delta:bestDelta};
  }

  // Best participation (across all weeks)
  let bestPart=null,bestPartPct=0;
  const lb={};
  weeks.forEach(w=>w.players.forEach(p=>{
    if(!lb[p.name])lb[p.name]={participated:0,totalFights:0,weeks:0};
    if(!p.exempt){lb[p.name].participated+=(p.participated||0);lb[p.name].totalFights+=(p.totalFights||0);lb[p.name].weeks++;}
  }));
  const latestNames=new Set(latest.players.map(p=>p.name));
  Object.entries(lb).forEach(([name,d])=>{
    if(!latestNames.has(name))return;
    if(d.totalFights>0&&d.weeks>=2){
      const pct=Math.round(d.participated/d.totalFights*100);
      if(pct>bestPartPct||(pct===bestPartPct&&d.weeks>(bestPart?bestPart.weeks:0))){bestPartPct=pct;bestPart={name,pct,weeks:d.weeks};}
    }
  });

  let hlHtml='';
  // Top 3 boss
  topBoss.forEach((p,i)=>{
    hlHtml+=`<div class="insight-card boss-card">
      <div class="ic-label">${['🥇','🥈','🥉'][i]} TOP BOSS</div>
      <div class="ic-name">${esc(p.name)}</div>
      <div class="ic-detail">${(p.boss||0).toLocaleString()} boss medals</div>
    </div>`;
  });
  // Top clash performer
  if(topClash.length){
    hlHtml+=`<div class="insight-card clash-card">
      <div class="ic-label">⚔ TOP CLASH</div>
      <div class="ic-name">${esc(topClash[0].name)}</div>
      <div class="ic-detail">${topClash[0].total.toLocaleString()} clash medals</div>
    </div>`;
  }
  // Biggest mover
  if(biggestMover){
    hlHtml+=`<div class="insight-card trend-card">
      <div class="ic-label">📈 BIGGEST BOSS MOVER</div>
      <div class="ic-name">${esc(biggestMover.name)}</div>
      <div class="ic-detail" style="color:${biggestMover.delta>=0?'var(--green)':'var(--red)'}">${biggestMover.delta>=0?'+':''}${biggestMover.delta.toFixed(1)}% vs last week</div>
    </div>`;
  }
  // Most consistent
  if(bestPart){
    hlHtml+=`<div class="insight-card trend-card">
      <div class="ic-label">🎯 MOST CONSISTENT</div>
      <div class="ic-name">${esc(bestPart.name)}</div>
      <div class="ic-detail">${bestPart.pct}% participation across ${bestPart.weeks} weeks</div>
    </div>`;
  }
  hl.innerHTML=hlHtml||'<div class="empty">Not enough data for highlights.</div>';

  // Clan trends chart
  const ordered=[...weeks].reverse();
  const avgBoss=ordered.map(w=>{const a=w.players.filter(p=>!p.exempt&&(p.boss||0)>0);return a.length?Math.round(a.reduce((s,p)=>s+(p.boss||0),0)/a.length):0;});
  const avgClash=ordered.map(w=>{const a=w.players.filter(p=>!p.exempt&&p.total>0);return a.length?Math.round(a.reduce((s,p)=>s+p.total,0)/a.length):0;});
  const maxTB=Math.max(...avgBoss,1);
  const maxTC=Math.max(...avgClash,1);

  trends.innerHTML=`
    <div style="font-size:12px;color:var(--muted);margin-bottom:10px">Average medals per member per week</div>
    <div class="chart-legend"><span><span class="ldot boss"></span>Avg Boss</span><span><span class="ldot clash"></span>Avg Clash</span></div>
    <div class="chart-cluster">
      <div class="cluster-section">
        <div class="cluster-label" style="color:var(--boss)">AVG BOSS</div>
        <div class="cbars">${ordered.map((w,i)=>{const h=Math.round(avgBoss[i]/maxTB*100);return`<div class="bcol"><div class="bfill boss-bar" style="height:${h}px" data-tip="Avg ${avgBoss[i]} — ${w.label}"></div><div class="blbl">${w.label.replace(/Week /,'W').replace(/ ·.*/,'')}</div></div>`;}).join('')}</div>
      </div>
      <div class="cluster-section">
        <div class="cluster-label" style="color:var(--accent)">AVG CLASH</div>
        <div class="cbars">${ordered.map((w,i)=>{const h=Math.round(avgClash[i]/maxTC*100);return`<div class="bcol"><div class="bfill clash-bar" style="height:${h}px" data-tip="Avg ${avgClash[i]} — ${w.label}"></div><div class="blbl">${w.label.replace(/Week /,'W').replace(/ ·.*/,'')}</div></div>`;}).join('')}</div>
      </div>
    </div>`;

  // Player comparison
  const allNames=new Set();
  weeks.forEach(w=>w.players.forEach(p=>allNames.add(p.name)));
  const sortedNames=[...allNames].sort((a,b)=>a.localeCompare(b));

  cmp.innerHTML=`
    <div class="compare-selects">
      <label>Player:</label>
      <select id="cmp-p1"><option value="">-- select --</option>${sortedNames.map(n=>`<option value="${esc(n)}">${esc(n)}</option>`).join('')}</select>
      <label>vs</label>
      <select id="cmp-p2"><option value="">-- select --</option>${sortedNames.map(n=>`<option value="${esc(n)}">${esc(n)}</option>`).join('')}</select>
    </div>
    <div id="cmp-result" style="font-size:12px;color:var(--muted);text-align:center">Select two players to compare side-by-side</div>`;

  document.getElementById('cmp-p1').addEventListener('change',updateCompare);
  document.getElementById('cmp-p2').addEventListener('change',updateCompare);
}

function updateCompare(){
  const n1=document.getElementById('cmp-p1').value;
  const n2=document.getElementById('cmp-p2').value;
  const res=document.getElementById('cmp-result');
  if(!n1||!n2){res.innerHTML='<div style="text-align:center;color:var(--muted)">Select two players to compare</div>';return;}

  function playerStats(name){
    let total=0,boss=0,wks=0,part=0,tf=0;
    const weekData=[];
    weeks.forEach(w=>{
      const p=w.players.find(x=>x.name===name);
      if(p&&!p.exempt){total+=p.total;boss+=(p.boss||0);wks++;part+=(p.participated||0);tf+=(p.totalFights||0);
        weekData.push({label:w.label,boss:p.boss||0,clash:p.total});}
    });
    return{total,boss,wks,part:tf>0?Math.round(part/tf*100):0,weekData:weekData.reverse()};
  }

  const s1=playerStats(n1),s2=playerStats(n2);
  function row(label,v1,v2,fmt){
    const f=fmt||((v)=>v.toLocaleString());
    const cls1=v1>v2?'color:var(--green)':v1<v2?'color:var(--red)':'color:var(--gold)';
    const cls2=v2>v1?'color:var(--green)':v2<v1?'color:var(--red)':'color:var(--gold)';
    return`<div class="cs-stat"><span class="csl">${label}</span><span style="${cls1};font-weight:700">${f(v1)}</span><span style="${cls2};font-weight:700">${f(v2)}</span></div>`;
  }

  res.innerHTML=`
    <div class="compare-side">
      <div class="cs-col" style="flex:1">
        <div style="display:flex;justify-content:space-between;margin-bottom:10px">
          <span style="font-weight:700;color:var(--gold)">${esc(n1)}</span>
          <span style="font-weight:700;color:var(--accent)">vs</span>
          <span style="font-weight:700;color:var(--gold)">${esc(n2)}</span>
        </div>
        ${row('🏰 Boss Total',s1.boss,s2.boss)}
        ${row('⚔ Clash Total',s1.total,s2.total)}
        ${row('Weeks',s1.wks,s2.wks)}
        ${row('Boss Avg/wk',s1.wks?Math.round(s1.boss/s1.wks):0,s2.wks?Math.round(s2.boss/s2.wks):0)}
        ${row('Clash Avg/wk',s1.wks?Math.round(s1.total/s1.wks):0,s2.wks?Math.round(s2.total/s2.wks):0)}
        ${row('Participation',s1.part,s2.part,v=>v+'%')}
      </div>
    </div>`;
}

// ── HISTORY ──
const WEEK_LIMIT=4;
function renderWeekCards(list){
  document.getElementById('week-history-grid').innerHTML=list.map(w=>`
    <div class="whcard">
      <div class="whtop"><span>🗓 ${esc(w.label)}</span><span style="font-size:11px;color:var(--muted)">${w.date}</span></div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:6px">${w.players.length} members · ${w.players.reduce((s,p)=>s+p.total,0).toLocaleString()} medals</div>
      <div style="font-size:10px;font-weight:700;color:var(--muted);margin-bottom:4px">GLORY MEMBERS</div>
      ${w.gloryWinners.map((g,i)=>`<div class="gbrow"><span>${['🥇','🥈','🥉'][i]}</span><span class="nm">${esc(g.name)}</span><span class="mt">${g.medals} 🏅</span></div>`).join('')}
    </div>`).join('');
}

function renderHistory(){
  window._whExpanded=false;
  if(!weeks.length){document.getElementById('week-history-grid').innerHTML='<div class="empty">No weeks saved yet.</div>';return;}
  renderWeekCards(weeks.slice(0,WEEK_LIMIT));
  const toggle=document.getElementById('week-history-toggle');
  if(weeks.length>WEEK_LIMIT){
    toggle.style.display='block';
    document.getElementById('wh-toggle-btn').textContent='▼ Show all '+weeks.length+' weeks';
  }else toggle.style.display='none';
}

function toggleWeekHistory(){
  window._whExpanded=!window._whExpanded;
  const btn=document.getElementById('wh-toggle-btn');
  if(window._whExpanded){renderWeekCards(weeks);btn.textContent='▲ Show recent only';}
  else{renderWeekCards(weeks.slice(0,WEEK_LIMIT));btn.textContent='▼ Show all '+weeks.length+' weeks';}
}

// ── HALL OF FAME ──
function renderHOF(){
  const counts={};
  weeks.forEach(w=>w.gloryWinners.forEach(g=>{counts[g.name]=(counts[g.name]||0)+1;}));
  const hof=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const container=document.getElementById('glory-hof');
  if(!hof.length){container.innerHTML='<div class="empty">No glory members yet.</div>';return;}
  const medals=['🥇','🥈','🥉'];
  container.innerHTML=hof.map(([n,c],i)=>`
    <div class="hof-card">
      <div class="hof-rank">${medals[i]||'#'+(i+1)}</div>
      <div class="hof-name">${esc(n)}</div>
      <div class="hof-count">${c} title${c!==1?'s':''} 👑</div>
    </div>`).join('');
}

init();
</script>
